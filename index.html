<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPropMap • Property Tax & Auction Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        #map { background: #f8fafc; }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-100">
    <nav class="bg-white border-b px-6 py-4 shadow-sm">
        <div class="max-w-screen-2xl mx-auto flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-teal-700 rounded-2xl flex items-center justify-center">
                        <span class="text-white font-bold">OP</span>
                    </div>
                    <span class="font-display text-2xl font-semibold tracking-tighter text-teal-700">OpenPropMap</span>
                </div>
            </div>
            
            <div class="flex-1 max-w-md flex items-center gap-x-2 min-w-0">
                <input id="location-search-input" type="text" placeholder="Search address or ZIP" class="flex-1 bg-white border border-slate-300 rounded-3xl px-4 py-2 text-sm" onkeydown="if(event.key==='Enter')searchLocation()">
                <button onclick="searchLocation()" class="px-5 py-2 bg-teal-700 text-white rounded-3xl text-sm font-medium">Go</button>
                <button onclick="myLocation()" class="px-4 py-2 border rounded-3xl text-sm">📍</button>
            </div>
            
            <div class="flex items-center gap-x-2 flex-wrap">
                <button onclick="zoomToAll()" class="px-4 py-2 text-sm border rounded-3xl">Fit All</button>
                <button onclick="showAddPropertyModal()" class="px-4 py-2 text-sm bg-emerald-600 text-white rounded-3xl">+ Add</button>
                <button onclick="importData()" class="px-4 py-2 text-sm border rounded-3xl">Import</button>
                <button onclick="loadFromBaserow()" class="px-4 py-2 text-sm bg-violet-600 text-white rounded-3xl">📡 Baserow</button>
                <button onclick="editData()" class="px-4 py-2 text-sm border rounded-3xl">JSON</button>
            </div>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-73px)]">
        <div class="w-96 bg-white border-r overflow-auto p-4">
            <!-- Sidebar content -->
            <div id="property-list" class="space-y-3"></div>
        </div>
        <div class="flex-1 relative">
            <div id="map" class="absolute inset-0"></div>
        </div>
    </div>

    <script>
        let properties = [];
        let map;
        function init() {
            map = L.map('map').setView([40, -100], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
        window.onload = init;
        
        function loadFromBaserow() {
            const token = prompt('Paste Baserow Token:');
            if (!token) return;
            alert('Token received. Loading from table 1078748... (demo mode)');
            // Full fetch logic would go here in real version
        }
    </script>
</body>
</html>
