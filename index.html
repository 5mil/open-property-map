<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPropMap • Property Tax & Auction Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        
        #map { background: #f8fafc; }
        
        .leaflet-popup-content-wrapper {
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .property-card {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .property-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08);
        }
        
        .status-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 8px;
            border-radius: 9999px;
        }
        
        .nav-button {
            transition: all 0.1s ease;
        }
        
        .nav-button:hover {
            transform: translateY(-1px);
        }
        
        .section-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: -.5px;
            text-transform: uppercase;
            color: #64748b;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Clean Navbar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto flex items-center justify-between gap-4">
            <!-- Logo -->
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-700 rounded-2xl flex items-center justify-center shadow-inner">
                    <span class="text-white font-display text-xl font-bold">OP</span>
                </div>
                <div>
                    <span class="font-display text-2xl font-semibold tracking-tighter">OpenProp</span>
                    <span class="font-display text-2xl font-semibold tracking-tighter text-teal-700">Map</span>
                </div>
            </div>

            <!-- Search -->
            <div class="flex-1 max-w-xl flex items-center gap-x-2">
                <div class="relative flex-1">
                    <input id="location-search-input" 
                           type="text" 
                           placeholder="Search address or ZIP code anywhere..."
                           class="w-full bg-white border border-slate-300 focus:border-teal-500 focus:ring-1 focus:ring-teal-500/30 transition-all placeholder:text-slate-400 text-sm rounded-3xl pl-11 pr-4 py-2.5 outline-none"
                           onkeydown="if (event.key === 'Enter') searchLocation()">
                    <div class="absolute left-4 top-3 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314-11.314z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                </div>
                <button onclick="searchLocation()" 
                        class="px-6 py-2.5 text-sm font-semibold rounded-3xl bg-teal-700 text-white hover:bg-teal-800 active:bg-teal-900 transition-colors shadow-sm">
                    Go
                </button>
                <button onclick="myLocation()" 
                        class="px-4 py-2.5 text-sm font-medium rounded-3xl border border-slate-300 hover:bg-slate-50 flex items-center gap-x-1.5">
                    📍 My Location
                </button>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-x-2">
                <button onclick="showAddPropertyModal()" 
                        class="nav-button flex items-center gap-x-2 px-4 py-2.5 text-sm font-semibold rounded-3xl bg-emerald-600 text-white hover:bg-emerald-700 active:bg-emerald-800 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="hidden md:inline">Add</span>
                </button>
                
                <button onclick="importData()" 
                        class="nav-button flex items-center gap-x-2 px-4 py-2.5 text-sm font-medium rounded-3xl border border-slate-300 hover:bg-slate-50">
                    <span>Import</span>
                </button>
                
                <button onclick="loadFromBaserow()" 
                        class="nav-button flex items-center gap-x-2 px-4 py-2.5 text-sm font-semibold rounded-3xl bg-violet-600 text-white hover:bg-violet-700">
                    <span>📡 Baserow</span>
                </button>
                
                <button onclick="exportMarkdown()" 
                        class="nav-button flex items-center gap-x-2 px-4 py-2.5 text-sm font-medium rounded-3xl border border-slate-300 hover:bg-slate-50">
                    <span>Export MD</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-73px)] max-w-screen-2xl mx-auto">
        <!-- Sidebar -->
        <div class="w-80 bg-white border-r border-slate-200 flex flex-col">
            <!-- Stats -->
            <div class="p-5 border-b border-slate-100">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 border border-slate-200 rounded-3xl p-4">
                        <div class="text-xs text-slate-500 font-medium tracking-wider">PROPERTIES</div>
                        <div id="stat-total" class="text-4xl font-semibold tabular-nums tracking-tighter mt-1">0</div>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 rounded-3xl p-4">
                        <div class="text-xs text-slate-500 font-medium tracking-wider">TAXES OWED</div>
                        <div id="stat-owed" class="text-4xl font-semibold tabular-nums tracking-tighter mt-1 text-rose-600">$0</div>
                    </div>
                </div>
                
                <div class="flex gap-2 mt-4">
                    <div onclick="setFilter('all')" class="flex-1 text-center py-1.5 text-xs font-semibold rounded-2xl border cursor-pointer active-filter" id="filter-all">ALL</div>
                    <div onclick="setFilter('Current')" class="flex-1 text-center py-1.5 text-xs font-semibold rounded-2xl border cursor-pointer text-emerald-700 border-emerald-200" id="filter-Current">CURRENT</div>
                    <div onclick="setFilter('Delinquent')" class="flex-1 text-center py-1.5 text-xs font-semibold rounded-2xl border cursor-pointer text-amber-700 border-amber-200" id="filter-Delinquent">DELINQUENT</div>
                    <div onclick="setFilter('Auction')" class="flex-1 text-center py-1.5 text-xs font-semibold rounded-2xl border cursor-pointer text-rose-700 border-rose-200" id="filter-Auction">AUCTION</div>
                </div>
            </div>

            <!-- Property List -->
            <div class="flex-1 overflow-y-auto p-3 bg-slate-50" id="property-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Map -->
        <div class="flex-1 relative bg-slate-200">
            <div id="map" class="absolute inset-0"></div>
            
            <!-- Map overlay info -->
            <div class="absolute bottom-4 right-4 bg-white/90 backdrop-blur px-4 py-1.5 rounded-2xl border text-xs text-slate-500 shadow-sm">
                Load data via Add • Import • Baserow
            </div>
        </div>
    </div>

    <!-- Add Property Modal -->
    <div id="add-property-modal" onclick="if (event.target.id === 'add-property-modal') closeAddPropertyModal()" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl shadow-2xl w-full max-w-md border border-slate-200">
            <div class="px-6 pt-5 pb-4 border-b flex items-center justify-between">
                <div class="font-semibold text-xl tracking-tight">Add New Property</div>
                <button onclick="closeAddPropertyModal()" class="text-2xl leading-none text-slate-400 hover:text-slate-600">×</button>
            </div>
            
            <div class="p-6 space-y-4 text-sm">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Address *</label>
                    <div class="flex gap-2">
                        <input id="add-address" type="text" placeholder="123 Main St, City, State ZIP" class="flex-1 border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                        <button onclick="geocodeAddressForAdd()" class="px-4 py-2 text-xs font-medium rounded-2xl border border-teal-300 text-teal-700">Geocode</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Parcel ID</label>
                        <input id="add-parcel" type="text" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Owner</label>
                        <input id="add-owner" type="text" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Property Type</label>
                        <select id="add-type" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                            <option>Single Family</option>
                            <option>Multi-Family</option>
                            <option>Commercial</option>
                            <option>Vacant Land</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Status</label>
                        <select id="add-status" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                            <option value="Current">Current</option>
                            <option value="Delinquent">Delinquent</option>
                            <option value="Auction">Auction</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Assessed Value</label>
                        <input id="add-assessed" type="number" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Annual Tax</label>
                        <input id="add-annual" type="number" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Taxes Owed</label>
                        <input id="add-owed" type="number" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Auction Date (if Auction)</label>
                    <input id="add-auction-date" type="date" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Notes</label>
                    <textarea id="add-notes" rows="2" class="w-full border border-slate-300 rounded-2xl px-4 py-2 text-sm"></textarea>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t flex justify-end gap-3 bg-slate-50 rounded-b-3xl">
                <button onclick="closeAddPropertyModal()" class="px-5 py-2 text-sm font-medium rounded-2xl border">Cancel</button>
                <button onclick="addPropertyFromForm()" class="px-6 py-2 text-sm font-semibold rounded-2xl bg-teal-700 text-white">Add Property</button>
            </div>
        </div>
    </div>

    <script>
        function initTailwind() {
            document.documentElement.style.setProperty('--accent', '#0f766e');
        }
        
        let properties = [];
        let map;
        let markers = {};
        let currentFilter = 'all';
        
        function init() {
            initTailwind();
            initMap();
            updateStats();
            renderPropertyList([]);
        }
        
        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([40, -100], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }
        
        function getStatusColor(status) {
            if (status === 'Current') return '#10b981';
            if (status === 'Delinquent') return '#f59e0b';
            if (status === 'Auction') return '#e11d48';
            return '#64748b';
        }
        
        function createMarkers(filteredProps = null) {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};
            
            const data = filteredProps || properties;
            if (data.length === 0) return;
            
            data.forEach(prop => {
                const color = getStatusColor(prop.status);
                const marker = L.circleMarker([prop.lat, prop.lng], {
                    radius: prop.status === 'Auction' ? 9 : 7,
                    fillColor: color,
                    color: '#fff',
                    weight: prop.status === 'Auction' ? 2.5 : 1.5,
                    fillOpacity: 0.9
                });
                
                marker.bindPopup(`
                    <div class="space-y-2">
                        <div class="font-semibold">${prop.address}</div>
                        <div class="flex items-center gap-2">
                            <span class="status-badge" style="background:${color}20;color:${color}">${prop.status}</span>
                            <span class="font-mono text-xs text-slate-500">${prop.parcel_id}</span>
                        </div>
                        <div>
                            <span class="text-xs text-slate-500">Taxes Owed</span>
                            <div class="font-semibold">$${prop.taxes_owed.toLocaleString()}</div>
                        </div>
                    </div>
                `);
                
                marker.on('click', () => showPropertyDetails(prop.id));
                markers[prop.id] = marker;
                marker.addTo(map);
            });
        }
        
        function updateStats(filtered = null) {
            const data = filtered || properties;
            const total = data.length;
            const owed = data.reduce((sum, p) => sum + (p.taxes_owed || 0), 0);
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-owed').innerHTML = '$' + (owed / 1000).toFixed(1) + 'k';
        }
        
        function renderPropertyList(filteredProps) {
            const container = document.getElementById('property-list');
            container.innerHTML = '';
            
            if (!filteredProps || filteredProps.length === 0) {
                container.innerHTML = `
                    <div class="p-6 text-center text-sm text-slate-500">
                        No properties loaded.<br>
                        Use <strong>Add</strong>, <strong>Import</strong>, or <strong>Baserow</strong>.
                    </div>
                `;
                return;
            }
            
            filteredProps.forEach(prop => {
                const card = document.createElement('div');
                card.className = `property-card bg-white border border-slate-200 hover:border-slate-300 rounded-2xl p-3.5 mb-2 cursor-pointer`;
                card.onclick = () => {
                    showPropertyDetails(prop.id);
                    focusMarkerOnMap(prop.id);
                };
                
                const statusColor = getStatusColor(prop.status);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <div class="font-medium text-sm leading-tight pr-2">${prop.address}</div>
                        <span class="status-badge text-xs px-2 py-px" style="background:${statusColor}15;color:${statusColor}">${prop.status}</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="font-mono text-slate-500">${prop.parcel_id}</div>
                        <div class="font-semibold ${prop.taxes_owed > 0 ? 'text-rose-600' : 'text-emerald-700'}">
                            $${prop.taxes_owed.toLocaleString()}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function setFilter(type) {
            currentFilter = type;
            let filtered = properties;
            
            if (type !== 'all') {
                filtered = filtered.filter(p => p.status === type);
            }
            
            renderPropertyList(filtered);
            createMarkers(filtered);
            updateStats(filtered);
        }
        
        function focusMarkerOnMap(id) {
            const prop = properties.find(p => p.id === id);
            if (!prop) return;
            map.flyTo([prop.lat, prop.lng], 15);
        }
        
        function showPropertyDetails(id) {
            const prop = properties.find(p => p.id === id);
            if (!prop) return;
            
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 bg-black/60 flex items-center justify-center z-[999] p-4`;
            modal.onclick = () => modal.remove();
            
            modal.innerHTML = `
                <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl w-full max-w-md shadow-2xl border">
                    <div class="p-6">
                        <div class="font-semibold text-xl mb-1">${prop.address}</div>
                        <div class="text-xs text-slate-500 mb-4 font-mono">${prop.parcel_id}</div>
                        
                        <div class="flex items-center gap-2 mb-6">
                            <span class="status-badge px-3 py-1 text-sm" style="background:${getStatusColor(prop.status)}15;color:${getStatusColor(prop.status)}">${prop.status}</span>
                            ${prop.auction_date ? `<span class="text-xs bg-rose-100 text-rose-700 px-2 py-1 rounded">Auction: ${prop.auction_date}</span>` : ''}
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 text-sm mb-6">
                            <div>
                                <div class="text-xs text-slate-500">ASSESSED VALUE</div>
                                <div class="font-semibold text-xl">$${prop.assessed_value.toLocaleString()}</div>
                            </div>
                            <div>
                                <div class="text-xs text-slate-500">TAXES OWED</div>
                                <div class="font-semibold text-xl text-rose-600">$${prop.taxes_owed.toLocaleString()}</div>
                            </div>
                        </div>
                        
                        <div class="text-sm space-y-1 mb-6">
                            <div><span class="text-slate-500">Owner:</span> ${prop.owner}</div>
                            <div><span class="text-slate-500">Type:</span> ${prop.property_type}</div>
                            <div><span class="text-slate-500">Annual Tax:</span> $${prop.annual_tax.toLocaleString()}</div>
                        </div>
                        
                        ${prop.notes ? `<div class="text-xs bg-slate-50 p-3 rounded-2xl">${prop.notes}</div>` : ''}
                    </div>
                    
                    <div class="border-t p-4 flex justify-end gap-3 bg-slate-50 rounded-b-3xl">
                        <button onclick="this.closest('.fixed').remove()" class="px-5 py-2 text-sm rounded-2xl border">Close</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        }
        
        function showAddPropertyModal() {
            document.getElementById('add-property-modal').classList.remove('hidden');
            document.getElementById('add-property-modal').classList.add('flex');
        }
        
        function closeAddPropertyModal() {
            const modal = document.getElementById('add-property-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
        
        async function geocodeAddressForAdd() {
            const addr = document.getElementById('add-address').value.trim();
            if (!addr) return alert('Enter an address');
            
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
            const data = await res.json();
            
            if (data.length > 0) {
                document.getElementById('add-address').dataset.lat = data[0].lat;
                document.getElementById('add-address').dataset.lng = data[0].lon;
                alert('Location found!');
            } else {
                alert('Could not geocode');
            }
        }
        
        function addPropertyFromForm() {
            const address = document.getElementById('add-address').value.trim();
            if (!address) return alert('Address required');
            
            const lat = parseFloat(document.getElementById('add-address').dataset.lat) || 40;
            const lng = parseFloat(document.getElementById('add-address').dataset.lng) || -100;
            
            const newProp = {
                id: 'PROP-' + Date.now(),
                parcel_id: document.getElementById('add-parcel').value || 'N/A',
                address: address,
                lat: lat,
                lng: lng,
                owner: document.getElementById('add-owner').value || 'Owner',
                property_type: document.getElementById('add-type').value,
                assessed_value: parseFloat(document.getElementById('add-assessed').value) || 0,
                annual_tax: parseFloat(document.getElementById('add-annual').value) || 0,
                taxes_owed: parseFloat(document.getElementById('add-owed').value) || 0,
                status: document.getElementById('add-status').value,
                auction_date: document.getElementById('add-auction-date').value || null,
                notes: document.getElementById('add-notes').value
            };
            
            properties.push(newProp);
            closeAddPropertyModal();
            createMarkers();
            updateStats();
            renderPropertyList(properties);
            
            map.flyTo([lat, lng], 15);
        }
        
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv,.json';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                
                reader.onload = (ev) => {
                    try {
                        let imported = [];
                        
                        if (file.name.endsWith('.json')) {
                            imported = JSON.parse(ev.target.result);
                        } else {
                            const lines = ev.target.result.trim().split('
');
                            const headers = lines[0].toLowerCase().split(',');
                            
                            for (let i = 1; i < lines.length; i++) {
                                const vals = lines[i].split(',');
                                const p = {};
                                headers.forEach((h, idx) => {
                                    if (h.includes('address')) p.address = vals[idx];
                                    if (h.includes('lat')) p.lat = parseFloat(vals[idx]);
                                    if (h.includes('lng')) p.lng = parseFloat(vals[idx]);
                                    if (h.includes('status')) p.status = vals[idx];
                                });
                                if (p.address && p.lat && p.lng) imported.push(p);
                            }
                        }
                        
                        properties = imported.filter(p => p.lat && p.lng && p.address);
                        createMarkers();
                        updateStats();
                        renderPropertyList(properties);
                        alert(`Imported ${properties.length} properties`);
                    } catch (err) {
                        alert('Import failed');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        async function loadFromBaserow() {
            const token = prompt('Paste your Baserow Database Token:');
            if (!token) return;
            
            const tableId = 1078748;
            const url = `https://api.baserow.io/api/database/rows/table/${tableId}/?user_field_names=true`;
            
            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': `Token ${token}` }
                });
                const data = await res.json();
                
                properties = (data.results || []).map(row => ({
                    id: 'BAS-' + row.id,
                    address: row.Address || '',
                    lat: parseFloat(row.Latitude),
                    lng: parseFloat(row.Longitude),
                    status: row.Status || 'Current',
                    taxes_owed: parseFloat(row['Taxes Owed']) || 0,
                    parcel_id: row['Parcel ID'] || 'N/A',
                    owner: row.Owner || '',
                    property_type: row['Property Type'] || 'Other',
                    assessed_value: parseFloat(row['Assessed Value']) || 0,
                    annual_tax: parseFloat(row['Annual Tax']) || 0,
                    auction_date: row['Auction Date'] || null,
                    notes: row.Notes || ''
                })).filter(p => p.lat && p.lng);
                
                createMarkers();
                updateStats();
                renderPropertyList(properties);
                alert(`Loaded ${properties.length} properties from Baserow`);
            } catch (e) {
                alert('Failed to load from Baserow. Check token.');
            }
        }
        
        function exportMarkdown() {
            if (properties.length === 0) {
                alert('No properties to export');
                return;
            }
            
            let md = `# OpenPropMap Export

`;
            md += `**Total Properties:** ${properties.length}

`;
            md += `| Address | Parcel ID | Status | Taxes Owed | Auction Date |
`;
            md += `|---------|-----------|--------|------------|--------------|
`;
            
            properties.forEach(p => {
                md += `| ${p.address} | ${p.parcel_id} | ${p.status} | $${p.taxes_owed} | ${p.auction_date || '-'} |
`;
            });
            
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `openpropmap-export-${new Date().toISOString().slice(0,10)}.md`;
            a.click();
        }
        
        function applyFilters() {
            let filtered = properties;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.status === currentFilter);
            }
            renderPropertyList(filtered);
            createMarkers(filtered);
        }
        
        window.onload = function() {
            init();
        };
    </script>
</body>
</html>
